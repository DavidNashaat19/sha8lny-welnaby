# =============================================================================
#  Freelance Market Monitor - Daily Scraper Pipeline
#  File   : .github/workflows/daily_scraper.yml
#  Course : CS313x Information Retrieval
#  Project: Freelance Market Monitor
# =============================================================================
#
#  PIPELINE OVERVIEW
#  -----------------
#  1. Triggers every day at 00:00 UTC, or manually from the Actions tab.
#  2. Checks out the repo and sets up a cached Python 3.11 environment.
#  3. Runs scraper.py, which writes/overwrites freelance_data.json.
#  4. Validates the output JSON before committing.
#  5. Commits and pushes the updated JSON back to the repo only if data changed.
#  6. Uploads freelance_data.json as a downloadable workflow artifact (30 days).
#  7. Posts a rich Markdown summary to the Actions run page.
#
#  ONE-TIME REPO SETUP REQUIRED
#  -----------------------------
#  Settings > Actions > General > Workflow permissions
#      [x] Read and write permissions
# =============================================================================

name: Daily Freelance Data Scraper

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
on:
  schedule:
    - cron: "0 0 * * *"   # Every day at 00:00 UTC

  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Enable verbose Python logging"
        type: boolean
        required: false
        default: false
      max_pages:
        description: "Pages to scrape per platform (default: 10)"
        type: number
        required: false
        default: 10

# ---------------------------------------------------------------------------
# Concurrency — one run at a time; never cancel a running job
# ---------------------------------------------------------------------------
concurrency:
  group: scraper-pipeline
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Permissions — write access so the bot can push the updated JSON
# ---------------------------------------------------------------------------
permissions:
  contents: write

# ---------------------------------------------------------------------------
# Global environment variables
# ---------------------------------------------------------------------------
env:
  OUTPUT_FILE: freelance_data.json
  PYTHON_VERSION: "3.11"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  scrape:
    name: "Scrape > Validate > Commit"
    runs-on: ubuntu-latest
    timeout-minutes: 60    # Hard cap — scraper should finish well under 30 min

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run scraper ─────────────────────────────────────────────────────
      - name: Run scraper
        env:
          DEBUG_MODE: ${{ inputs.debug_mode || 'false' }}
          MAX_PAGES:  ${{ inputs.max_pages  || '10'    }}
        run: python scraper.py

      # ── 5. Validate output ─────────────────────────────────────────────────
      # Ensures the JSON is well-formed and contains at least one record
      # before we ever commit it. A scraper failure that writes an empty
      # or malformed file will be caught here, not silently pushed.
      - name: Validate output JSON
        id: validate
        run: |
          python - <<'EOF'
          import json, sys, os

          path = os.environ.get("OUTPUT_FILE", "freelance_data.json")

          try:
              with open(path, encoding="utf-8") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print(f"ERROR: {path} was not created by the scraper.")
              sys.exit(1)
          except json.JSONDecodeError as e:
              print(f"ERROR: {path} is not valid JSON: {e}")
              sys.exit(1)

          total   = data.get("metadata", {}).get("total_records", 0)
          platforms = data.get("metadata", {}).get("platforms", [])

          if total == 0:
              print("WARNING: Scraper ran but collected 0 records.")
              print("The target sites may have changed their HTML structure.")
              sys.exit(1)

          print(f"Validation passed: {total} records from {platforms}")

          # Export values for later steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh_out:
              gh_out.write(f"total_records={total}\n")
              gh_out.write(f"platforms={','.join(platforms)}\n")
          EOF
        env:
          OUTPUT_FILE: ${{ env.OUTPUT_FILE }}

      # ── 6. Commit & push ───────────────────────────────────────────────────
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --staged --quiet; then
            echo "No changes detected in $OUTPUT_FILE — nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            RECORDS="${{ steps.validate.outputs.total_records }}"
            TRIGGER="${{ github.event_name }}"

            git commit -m "data: auto-update freelance_data.json [${RECORDS} records, ${TRIGGER}, ${TIMESTAMP}]"
            git push
            echo "freelance_data.json committed and pushed successfully."
          fi

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: Upload freelance_data.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freelance-data-${{ github.run_id }}
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 30
          if-no-files-found: warn

      # ── 8. Job summary ─────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Freelance Market Monitor - Run Summary

          | Field              | Value                                         |
          |--------------------|-----------------------------------------------|
          | **Status**         | ${{ job.status }}                             |
          | **Trigger**        | \`${{ github.event_name }}\`                  |
          | **Records**        | ${{ steps.validate.outputs.total_records }}   |
          | **Platforms**      | ${{ steps.validate.outputs.platforms }}       |
          | **Runner OS**      | \`${{ runner.os }}\`                          |
          | **Python**         | \`${{ env.PYTHON_VERSION }}\`                 |
          | **Run ID**         | \`${{ github.run_id }}\`                      |
          | **Timestamp UTC**  | $(date -u +'%Y-%m-%d %H:%M:%S')              |
          EOF
